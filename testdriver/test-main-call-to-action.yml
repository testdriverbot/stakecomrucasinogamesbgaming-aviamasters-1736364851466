version: 4.1.33
steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: Identify the main call to action button or link on the page.
    commands:
      - command: hover-text
        text: Verify you are human
        description: captcha verification checkbox
        action: hover
  - prompt: Click on the call to action.
    commands:
      - command: hover-text
        text: Verify you are human
        description: captcha verification checkbox
        action: click
  - prompt: >-
      Assert that the expected action occurs  # Use the content of the file from
      the environment
    commands:
      - command: assert
        expect: the page shows a verification success message
